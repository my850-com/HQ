<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings | MY850 HQ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .back-link {
            color: var(--accent-teal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 500;
            transition: color var(--transition-fast);
        }
        
        .back-link:hover {
            color: var(--text-primary);
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: center;
        }
        
        .stat-card.active {
            border-color: var(--accent-teal);
        }
        
        .stat-card.volume {
            border-color: var(--success);
        }
        
        .stat-card.revenue {
            border-color: var(--warning);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .listing-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            cursor: pointer;
        }
        
        .listing-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-teal);
        }
        
        .listing-header {
            display: grid;
            grid-template-columns: 140px 1fr auto;
            gap: var(--spacing-lg);
            padding: var(--spacing-lg);
            align-items: start;
        }
        
        .listing-photo {
            width: 140px;
            height: 100px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-tertiary);
        }
        
        .listing-main h3 {
            font-size: 1.1rem;
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
        }
        
        .listing-location {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .listing-tags {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }
        
        .tag {
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .tag-type {
            background: rgba(40, 167, 69, 0.2);
            color: var(--success);
        }
        
        .tag-dom {
            background: rgba(100, 181, 246, 0.2);
            color: var(--accent-teal);
        }
        
        .listing-price {
            text-align: right;
        }
        
        .price-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
        }
        
        .revenue-value {
            font-size: 0.9rem;
            color: var(--warning);
            margin-top: var(--spacing-xs);
        }
        
        .listing-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .listing-details.expanded {
            max-height: 600px;
        }
        
        .details-content {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-md);
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        
        .detail-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .details-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }
        
        .showing-notes {
            background: rgba(64, 181, 246, 0.1);
            border-left: 3px solid var(--accent-teal);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        
        .showing-notes-label {
            font-size: 0.75rem;
            color: var(--accent-teal);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-xs);
        }
        
        .showing-notes-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .loading-listings {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
        }
        
        .no-listings {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
        
        .expand-icon {
            font-size: 1.25rem;
            color: var(--accent-teal);
            transition: transform 0.3s;
        }
        
        .expand-icon.expanded {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="dark-mode">
    
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <div class="logo-text">
                    <h1>Active Listings</h1>
                    <span class="logo-tagline">Property Portfolio</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>
    
    <main class="main-container">
        
        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card active">
                <div class="stat-number" id="activeCount">--</div>
                <div class="stat-label">Active Listings</div>
            </div>
            <div class="stat-card volume">
                <div class="stat-number" id="totalVolume">$--</div>
                <div class="stat-label">Total Volume</div>
            </div>
            <div class="stat-card revenue">
                <div class="stat-number" id="projectedRevenue">$--</div>
                <div class="stat-label">Proj. Revenue (2.75%)</div>
            </div>
        </div>
        
        <!-- Listings Grid -->
        <div class="listings-grid" id="listingsGrid">
            <div class="loading-listings">
                <div class="loading-spinner"></div>
                <p>Loading listings...</p>
            </div>
        </div>
        
    </main>
    
    <script>
        // Load listings from JSON
        async function loadListings() {
            const grid = document.getElementById('listingsGrid');
            
            try {
                // Fetch from team-listings.json (in parent directory for GitHub Pages)
                const response = await fetch('../team-listings.json');
                const data = await response.json();
                const listings = data.listings.filter(l => l.status === 'Active');
                
                if (!listings || listings.length === 0) {
                    grid.innerHTML = '<div class="no-listings">No active listings found.</div>';
                    return;
                }
                
                // Calculate stats
                const totalVolume = listings.reduce((sum, l) => sum + (l.listPrice || 0), 0);
                const projectedRevenue = totalVolume * 0.0275;
                
                // Update stats
                document.getElementById('activeCount').textContent = listings.length;
                document.getElementById('totalVolume').textContent = '$' + (totalVolume / 1000000).toFixed(2) + 'M';
                document.getElementById('projectedRevenue').textContent = '$' + Math.round(projectedRevenue / 1000) + 'K';
                
                // Render listings
                grid.innerHTML = listings.map(listing => {
                    const projected = (listing.listPrice || 0) * 0.0275;
                    return `
                        <div class="listing-card" onclick="toggleDetails('${listing.mlsNumber}')">
                            <div class="listing-header">
                                <img src="${listing.photoUrl || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 140 100%22><rect fill=%22%232a2a3a%22 width=%22140%22 height=%22100%22/><text fill=%22%23666%22 x=%2270%22 y=%2255%22 text-anchor=%22middle%22>No Photo</text></svg>'}" 
                                     alt="${listing.address}" class="listing-photo">
                                <div class="listing-main">
                                    <h3>${listing.address}</h3>
                                    <div class="listing-location">${listing.city}, ${listing.state} ${listing.zip}</div>
                                    <div class="listing-tags">
                                        <span class="tag tag-type">${listing.propertyType || 'Unknown'}</span>
                                        <span class="tag tag-dom">${listing.daysOnMarket} DOM</span>
                                    </div>
                                </div>
                                <div class="listing-price">
                                    <div class="price-value">$${(listing.listPrice || 0).toLocaleString()}</div>
                                    <div class="revenue-value">Proj: $${Math.round(projected).toLocaleString()}</div>
                                    <div class="expand-icon" id="icon-${listing.mlsNumber}">▼</div>
                                </div>
                            </div>
                            <div class="listing-details" id="details-${listing.mlsNumber}">
                                <div class="details-content">
                                    <div class="details-grid">
                                        <div class="detail-item">
                                            <span class="detail-label">MLS Number</span>
                                            <span class="detail-value">${listing.mlsNumber}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">Seller</span>
                                            <span class="detail-value">${listing.sellerName || 'N/A'}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">List Date</span>
                                            <span class="detail-value">${listing.listingDate || 'N/A'}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">Expires</span>
                                            <span class="detail-value">${listing.expirationDate || 'N/A'}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">Bed / Bath</span>
                                            <span class="detail-value">${listing.bedrooms || 0} / ${listing.bathrooms || 'N/A'}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">Square Feet</span>
                                            <span class="detail-value">${(listing.sqft || 0).toLocaleString()}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">Year Built</span>
                                            <span class="detail-value">${listing.yearBuilt || 'N/A'}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">Subdivision</span>
                                            <span class="detail-value">${listing.subdivision || 'N/A'}</span>
                                        </div>
                                        ${listing.originalListPrice ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Original Price</span>
                                            <span class="detail-value">$${(listing.originalListPrice).toLocaleString()}</span>
                                        </div>
                                        ` : ''}
                                        ${listing.acreage ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Lot Size</span>
                                            <span class="detail-value">${listing.acreage} acres</span>
                                        </div>
                                        ` : ''}
                                        ${listing.hoa ? `
                                        <div class="detail-item">
                                            <span class="detail-label">HOA</span>
                                            <span class="detail-value">${listing.hoa}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">HOA Fee</span>
                                            <span class="detail-value">$${(listing.hoaFee || 0).toLocaleString()}/year</span>
                                        </div>
                                        ` : ''}
                                        ${listing.taxes ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Taxes</span>
                                            <span class="detail-value">$${(listing.taxes).toLocaleString()}/year</span>
                                        </div>
                                        ` : ''}
                                    </div>
                                    ${listing.showingNotes ? `
                                    <div class="showing-notes">
                                        <div class="showing-notes-label">Showing Notes</div>
                                        <div class="showing-notes-text">${listing.showingNotes}</div>
                                    </div>
                                    ` : ''}
                                    <div class="details-actions">
                                        <a href="https://search.my850.com/property/${listing.mlsNumber}" target="_blank" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">
                                            🔗 View on my850
                                        </a>
                                        <button class="btn btn-outline btn-sm" onclick="copyInfo(this, '${listing.mlsNumber}')">
                                            📋 Copy Info
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading listings:', error);
                grid.innerHTML = '<div class="no-listings">Failed to load listings. Check console for details.</div>';
            }
        }
        
        // Toggle listing details
        function toggleDetails(mlsNumber) {
            const details = document.getElementById(`details-${mlsNumber}`);
            const icon = document.getElementById(`icon-${mlsNumber}`);
            
            details.classList.toggle('expanded');
            icon.classList.toggle('expanded');
        }
        
        // Copy listing info
        function copyInfo(button, mlsNumber) {
            event.stopPropagation();
            
            // Find the listing data from the DOM
            const card = button.closest('.listing-card');
            const address = card.querySelector('h3').textContent;
            const price = card.querySelector('.price-value').textContent;
            
            const text = `MLS #${mlsNumber} - ${address} - ${price}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.textContent;
                button.textContent = '✓ Copied!';
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            });
        }
        
        // Load on page load
        document.addEventListener('DOMContentLoaded', loadListings);
    </script>
    
</body>
</html>
