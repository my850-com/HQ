<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings | MY850 HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .listings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xl); padding: var(--spacing-lg); background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .listings-title h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: var(--spacing-xs); }
        .listings-title p { color: var(--text-muted); font-size: 0.9rem; }
        .back-link { color: var(--accent-teal); text-decoration: none; display: flex; align-items: center; gap: var(--spacing-sm); font-weight: 500; }
        .back-link:hover { color: var(--text-primary); }
        .pipeline-summary { background: linear-gradient(135deg, var(--success), #34ce57); border-radius: var(--radius-md); padding: var(--spacing-lg); margin-bottom: var(--spacing-xl); display: flex; justify-content: space-between; }
        .pipeline-value-label { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .pipeline-value-number { font-size: 2.5rem; font-weight: 800; margin-top: var(--spacing-xs); }
        .pipeline-stat { font-size: 0.9rem; opacity: 0.9; }
        .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: var(--spacing-lg); }
        .listing-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; transition: transform var(--transition-fast); }
        .listing-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .listing-image { height: 200px; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; }
        .listing-image img { width: 100%; height: 100%; object-fit: cover; }
        .listing-content { padding: var(--spacing-lg); }
        .listing-address { font-size: 1.1rem; font-weight: 600; margin-bottom: var(--spacing-xs); }
        .listing-location { color: var(--text-muted); font-size: 0.85rem; margin-bottom: var(--spacing-sm); }
        .listing-price { font-size: 1.5rem; font-weight: 800; color: var(--success); margin-bottom: var(--spacing-sm); }
        .listing-details { display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-sm); font-size: 0.9rem; color: var(--text-secondary); }
        .listing-status { display: inline-block; padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; background: rgba(40, 167, 69, 0.2); color: var(--success); }
        .loading-listings { text-align: center; padding: var(--spacing-xl); color: var(--text-muted); }
        .error-message { background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.3); color: var(--danger); padding: var(--spacing-lg); border-radius: var(--radius-md); text-align: center; }
    </style>
</head>
<body class="dark-mode">
    
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <div class="logo-text">
                    <h1>My Listings</h1>
                    <span class="logo-tagline">Property Portfolio</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>
    
    <main class="main-container">
        
        <div class="listings-header">
            <div class="listings-title">
                <h1>Active Listings</h1>
                <p>All properties currently on the market</p>
            </div>
        </div>
        
        <!-- Pipeline Value Summary -->
        <div class="pipeline-summary" id="pipelineSummary">
            <div>
                <div class="pipeline-value-label">Total Pipeline Value</div>
                <div class="pipeline-value-number" id="pipelineValue">$--</div>
            </div>
            <div style="text-align: right;">
                <div class="pipeline-stat" id="listingsCount">-- properties</div>
                <div class="pipeline-stat" id="avgPrice">Avg: $--</div>
            </div>
        </div>
        
        <!-- Listings Grid -->
        <div class="listings-grid" id="listingsGrid">
            <div class="loading-listings">
                <div class="loading-spinner"></div>
                <p>Loading listings...</p>
            </div>
        </div>
        
    </main>
    
    <script>
        // Load from Google Sheets CSV (auto-updates when sheet changes)
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdI2q5qlHpihVdEm7ev8GHjCqWQQ7NTX0C2MnNRYWkd2eAweBjdPRA2zEG-4xq5dJ4FdvqhgOCkuXU/pub?gid=494197748&single=true&output=csv';
        
        // Global storage for listings data
        let currentListings = [];
        
        async function loadListings() {
            const grid = document.getElementById('listingsGrid');
            
            try {
                // Fetch with explicit headers
                const response = await fetch(SHEET_CSV_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'text/csv,text/plain,*/*'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }
                
                const csv = await response.text();
                
                if (!csv || csv.trim().length === 0) {
                    throw new Error('Empty CSV response');
                }
                
                const listings = parseCSV(csv);
                
                // Filter Active listings (Status column = 'A')
                const activeListings = listings.filter(l => l.Status === 'A');
                
                if (activeListings.length === 0) {
                    grid.innerHTML = '<div class="error-message">No active listings found.</div>';
                    return;
                }
                
                // Calculate pipeline value
                const totalValue = activeListings.reduce((sum, l) => {
                    return sum + (parseFloat(l['List Price']) || 0);
                }, 0);
                const avgPrice = totalValue / activeListings.length;
                
                // Update stats
                document.getElementById('pipelineValue').textContent = formatCurrency(totalValue);
                document.getElementById('listingsCount').textContent = activeListings.length + ' properties';
                document.getElementById('avgPrice').textContent = 'Avg: ' + formatCurrency(avgPrice);
                
                // Store listings globally for lookup
                currentListings = activeListings;
                
                // Render listings
                grid.innerHTML = activeListings.map((l, index) => {
                    const price = parseFloat(l['List Price']) || 0;
                    const address = l.Address || 'No address';
                    const city = l.City || '';
                    const state = l.State || 'FL';
                    const county = l.County || '';
                    const beds = l.Bedrooms || '--';
                    const baths = l['Total Baths'] || l['Full Baths'] || '--';
                    const sqft = l['Apx SqFt(Htd/Cooled)'] || '--';
                    const photoUrl = l['Photo URL'] || '';
                    const homesUrl = l['Homes Link'] || '';
                    const zillowUrl = l['Zillow Link'] || '';
                    const mlsNumber = l['List Number'] || '';
                    
                    const sellerName = l['Sellers Name'] || 'Seller';
                    const listDate = l['List Date'] || '';
                    const dom = l['Days on Market'] || '--';
                    
                    // Determine property link priority: Homes.com → Zillow → none
                    let propertyLink = '';
                    let linkText = '';
                    if (homesUrl) {
                        propertyLink = homesUrl;
                        linkText = '🏠 View on Homes.com';
                    } else if (zillowUrl) {
                        propertyLink = zillowUrl;
                        linkText = '📍 View on Zillow';
                    }
                    
                    return `
                        <div class="listing-card" data-mls="${mlsNumber || index}">
                            <div class="listing-image">
                                ${photoUrl ? `<img src="${photoUrl}" alt="${address}">` : '🏠'}
                            </div>
                            <div class="listing-content">
                                <div class="listing-address">${address}</div>
                                <div class="listing-location">${city}, ${county} County</div>
                                <div class="listing-price">${formatCurrency(price)}</div>
                                <div class="listing-details">
                                    <span>${beds} beds</span>
                                    <span>${baths} baths</span>
                                    <span>${sqft} sqft</span>
                                </div>
                                
                                <!-- Property Link -->
                                ${propertyLink ? `<a href="${propertyLink}" target="_blank" style="display:block;color:var(--accent-teal);font-size:0.85rem;margin-bottom:0.5rem;">${linkText}</a>` : ''}
                                
                                <!-- Actions Dropdown -->
                                <div class="listing-actions" style="margin-top:10px;position:relative;">
                                    <button class="actions-toggle" onclick="toggleActions(${index}, event)" style="background:#2E5090;color:white;border:none;padding:8px 12px;border-radius:6px;font-size:0.85rem;cursor:pointer;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;">
                                        <span>⚡ Actions</span>
                                        <span id="arrow-${index}">▼</span>
                                    </button>
                                    <div class="actions-menu" id="actions-${index}" style="display:none;position:absolute;top:100%;left:0;right:0;background:#1a2d4a;border:2px solid #4a90d9;border-radius:6px;z-index:9999;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,0.8);">
                                        <a href="#" onclick="generateSellerUpdateByIndex(event, ${index}); return false;" style="display:block;padding:12px 16px;color:#e0e6f0;text-decoration:none;font-size:0.9rem;border-bottom:1px solid #2a3f5f;transition:all 0.2s;" onmouseover="this.style.background='#2E5090';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#e0e6f0'">
                                            📱 Seller Update
                                        </a>
                                        <a href="#" onclick="copyToClipboard(event, '${escapeHtml(address)}'); return false;" style="display:block;padding:12px 16px;color:#e0e6f0;text-decoration:none;font-size:0.9rem;border-bottom:1px solid #2a3f5f;transition:all 0.2s;" onmouseover="this.style.background='#2E5090';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#e0e6f0'">
                                            📋 Copy Address
                                        </a>
                                        <a href="https://maps.google.com/?q=${encodeURIComponent(address)}" target="_blank" style="display:block;padding:12px 16px;color:#e0e6f0;text-decoration:none;font-size:0.9rem;transition:all 0.2s;" onmouseover="this.style.background='#2E5090';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#e0e6f0'">
                                            🗺️ View on Map
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                console.log('Loaded', activeListings.length, 'active listings from Google Sheets');
                
            } catch (error) {
                console.error('Error loading listings:', error);
                grid.innerHTML = '<div class="error-message">Failed to load listings. Check console for details.</div>';
            }
        }
        
        // Parse CSV to array of objects
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];
            
            const headers = parseCSVLine(lines[0]);
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] || '';
                });
                data.push(obj);
            }
            
            return data;
        }
        
        // Parse a single CSV line (handles quotes)
        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (const char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }
        
        function formatCurrency(value) {
            if (value >= 1000000) return '$' + (value / 1000000).toFixed(2) + 'M';
            if (value >= 1000) return '$' + (value / 1000).toFixed(0) + 'K';
            return '$' + value.toFixed(0);
        }
        
        // Generate Seller Update by Index (looks up from stored data)
        function generateSellerUpdateByIndex(event, index) {
            event.stopPropagation();
            
            const listingData = currentListings[index];
            if (!listingData) {
                alert('Error: Listing data not found');
                return;
            }
            
            // Extract fields
            const sellerName = listingData['Sellers Name'] || 'Seller';
            const address = listingData['Address'] || 'Property';
            const price = parseFloat(listingData['List Price']) || 0;
            const dom = listingData['Days on Market'] || '--';
            const zillowViews = listingData['Zillow Views'] || '0';
            const zillowSaves = listingData['Zillow Saves'] || '0';
            const showings = listingData['Showings Since Last'] || '0';
            const inquiries = listingData['Total Inquiries'] || '0';
            const feedback = listingData['Resent Agent Feedback'] || '';
            
            // Format the message
            const message = `Hi ${sellerName},

Update for ${address}:

📊 THE NUMBERS
• Price: ${formatCurrency(price)}
• Days on Market: ${dom}

🏠 ONLINE ACTIVITY  
• Zillow: ${zillowViews} views, ${zillowSaves} saves
• Showings: ${showings}
• Inquiries: ${inquiries}

💬 AGENT FEEDBACK:
${feedback ? feedback.trim() : 'No recent feedback.'}

— Lars, Sherlock HQ`;
            
            // Copy to clipboard
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(message).then(() => {
                    alert('✅ Copied!\n\n' + message + '\n\nPaste into your text message.');
                }).catch(() => {
                    alert(message + '\n\n(Copy this text to send to seller)');
                });
            } else {
                alert(message + '\n\n(Copy this text to send to seller)');
            }
        }
        
        // Actions Dropdown Functions
        function toggleActions(index, event) {
            event.stopPropagation();
            
            // Close all other menus
            document.querySelectorAll('.actions-menu.open').forEach(menu => {
                if (menu.id !== `actions-${index}`) {
                    menu.classList.remove('open');
                }
            });
            
            // Toggle this menu
            const menu = document.getElementById(`actions-${index}`);
            if (menu) {
                menu.classList.toggle('open');
            }
        }
        
        // Close menus when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.listing-actions')) {
                document.querySelectorAll('.actions-menu.open').forEach(menu => {
                    menu.classList.remove('open');
                });
            }
        });
        
        // Helper: Copy to clipboard
        async function copyToClipboard(event, text) {
            event.stopPropagation();
            try {
                await navigator.clipboard.writeText(text);
                // Visual feedback - could add toast notification
                const btn = event.target;
                const original = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => btn.textContent = original, 1500);
            } catch (err) {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }
        
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
            return text.replace(/[&<>"']/g, c => map[c]);
        }
        
        document.addEventListener('DOMContentLoaded', loadListings);
        
        // SELLER UPDATE SKILL (SIMPLIFIED)
        function generateSellerUpdate(btn, listingData) {
            // Extract basic fields
            const sellerName = listingData['Sellers Name'] || 'Seller';
            const address = listingData['Address'] || 'Property';
            const listPrice = parseFloat(listingData['List Price']) || 0;
            const dom = listingData['Days on Market'] || '--';
            const zillowViews = listingData['Zillow Views'] || '0';
            const zillowSaves = listingData['Zillow Saves'] || '0';
            
            // Simple formatted message
            const message = `Seller Update\n\n${address}\n\nPrice: ${formatCurrency(listPrice)}\nDays on Market: ${dom}\nZillow Views: ${zillowViews}\nSaves: ${zillowSaves}`;
            
            // Simple alert for now
            alert(message + '\n\n(Copy this text to send to seller)');
            
            // Copy to clipboard
            navigator.clipboard.writeText(message).then(() => {
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = 'Seller Update';
                }, 2000);
            });
        }
        
        // Telegram Bot Config
        const TELEGRAM_BOT_TOKEN = '8726369953:AAGJJ8fcf5uhcvUBwXZEPvApAQnSwhYeRBU';
        const TELEGRAM_CHAT_ID = '-5101742438';
        
        let currentMessageForTelegram = '';
        let currentPropertyName = '';
        
        function showSellerUpdateModal(message, propertyName, sellerName) {
            currentMessageForTelegram = message;
            currentPropertyName = propertyName;
            
            // Create modal
            const modal = document.createElement('div');
            modal.className = 'seller-update-modal';
            modal.innerHTML = `
                <div class="modal-overlay" onclick="closeSellerModal()"></div>
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>📱 Seller Update — ${propertyName.substring(0, 30)}${propertyName.length > 30 ? '...' : ''}</h3>
                        <button class="modal-close" onclick="closeSellerModal()">×</button>
                    </div>
                    <div class="modal-body">
                        <textarea id="sellerUpdateText" readonly>${message}</textarea>
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.5rem;">
                            📋 Your update is ready. Copy to text message or send directly to Sherlock HQ.
                        </p>
                    </div>
                    <div class="modal-footer" style="flex-wrap:wrap;gap:10px;">
                        <button class="btn btn-primary" onclick="copySellerMessage()" style="flex:1;min-width:120px;">📋 Copy to Clipboard</button>
                        <button class="btn btn-success" onclick="sendToTelegram()" style="flex:1;min-width:120px;background:var(--success);">🚀 Send to Sherlock HQ</button>
                        <button class="btn btn-outline" onclick="closeSellerModal()" style="flex:1;min-width:100px;">Close</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            document.getElementById('sellerUpdateText').select();
        }
        
        // Send directly to Telegram
        async function sendToTelegram() {
            const btn = document.querySelector('.modal-footer .btn-success');
            const originalText = btn.textContent;
            btn.textContent = '📡 Sending...';
            btn.disabled = true;
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: currentMessageForTelegram,
                        parse_mode: 'HTML'
                    })
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    btn.textContent = '✅ Sent!';
                    btn.style.background = '#28a745';
                    
                    // Log success
                    console.log('✅ Seller update sent to Telegram:', currentPropertyName);
                    
                    setTimeout(() => {
                        closeSellerModal();
                    }, 1500);
                } else {
                    throw new Error(data.description || 'Send failed');
                }
            } catch (error) {
                console.error('Telegram send failed:', error);
                btn.textContent = '❌ Failed';
                btn.style.background = '#dc3545';
                
                // Fallback: show copy option
                alert('Send failed. Click "Copy to Clipboard" and paste manually into Telegram.');
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                    btn.style.background = '';
                }, 2000);
            }
        }
        
        function closeSellerModal() {
            const modal = document.querySelector('.seller-update-modal');
            if (modal) modal.remove();
        }
        
        function copySellerMessage() {
            const textarea = document.getElementById('sellerUpdateText');
            textarea.select();
            document.execCommand('copy');
            
            // Show feedback
            const btn = document.querySelector('.modal-footer .btn-primary');
            const original = btn.textContent;
            btn.textContent = '✓ Copied!';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
                btn.textContent = original;
                btn.style.background = '';
            }, 1500);
        }
    </script>
    
    <!-- Seller Update Modal Styles -->
    <style>
        .seller-update-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            width: 90%;
            max-width: 500px;
            position: relative;
            z-index: 10001;
        }
        .modal-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }
        .modal-body {
            padding: var(--spacing-lg);
        }
        #sellerUpdateText {
            width: 100%;
            min-height: 250px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: var(--spacing-md);
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
        .modal-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
        }
        .seller-update-btn {
            margin-top: 0.5rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            background: linear-gradient(135deg, var(--primary), var(--accent-teal));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .seller-update-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46,80,144,0.4);
        }
        
        /* Actions Dropdown */
        .listing-actions {
            position: relative;
            margin-top: 0.5rem;
        }
        
        .actions-toggle {
            background: linear-gradient(135deg, var(--bg-tertiary), #2a3f5f);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all var(--transition-fast);
            width: 100%;
        }
        
        .actions-toggle:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-teal);
        }
        
        .actions-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e2a4a;
            border: 2px solid #2E5090;
            border-radius: var(--radius-sm);
            z-index: 1000;
            overflow: hidden;
            margin-top: 4px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        
        .actions-menu.open {
            display: block;
        }
        
        .action-item {
            display: block;
            padding: 0.75rem 1rem;
