<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings | MY850 HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .listings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xl); padding: var(--spacing-lg); background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .listings-title h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: var(--spacing-xs); }
        .listings-title p { color: var(--text-muted); font-size: 0.9rem; }
        .back-link { color: var(--accent-teal); text-decoration: none; display: flex; align-items: center; gap: var(--spacing-sm); font-weight: 500; }
        .back-link:hover { color: var(--text-primary); }
        .pipeline-summary { background: linear-gradient(135deg, var(--success), #34ce57); border-radius: var(--radius-md); padding: var(--spacing-lg); margin-bottom: var(--spacing-xl); display: flex; justify-content: space-between; }
        .pipeline-value-label { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .pipeline-value-number { font-size: 2.5rem; font-weight: 800; margin-top: var(--spacing-xs); }
        .pipeline-stat { font-size: 0.9rem; opacity: 0.9; }
        .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: var(--spacing-lg); }
        .listing-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; transition: transform var(--transition-fast); }
        .listing-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .listing-image { height: 200px; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; }
        .listing-image img { width: 100%; height: 100%; object-fit: cover; }
        .listing-content { padding: var(--spacing-lg); }
        .listing-address { font-size: 1.1rem; font-weight: 600; margin-bottom: var(--spacing-xs); }
        .listing-location { color: var(--text-muted); font-size: 0.85rem; margin-bottom: var(--spacing-sm); }
        .listing-price { font-size: 1.5rem; font-weight: 800; color: var(--success); margin-bottom: var(--spacing-sm); }
        .listing-details { display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-sm); font-size: 0.9rem; color: var(--text-secondary); }
        .listing-status { display: inline-block; padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; background: rgba(40, 167, 69, 0.2); color: var(--success); }
        .loading-listings { text-align: center; padding: var(--spacing-xl); color: var(--text-muted); }
        .error-message { background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.3); color: var(--danger); padding: var(--spacing-lg); border-radius: var(--radius-md); text-align: center; }
    </style>
</head>
<body class="dark-mode">
    
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <div class="logo-text">
                    <h1>My Listings</h1>
                    <span class="logo-tagline">Property Portfolio</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>
    
    <main class="main-container">
        
        <div class="listings-header">
            <div class="listings-title">
                <h1>Active Listings</h1>
                <p>All properties currently on the market</p>
            </div>
        </div>
        
        <!-- Pipeline Value Summary -->
        <div class="pipeline-summary" id="pipelineSummary">
            <div>
                <div class="pipeline-value-label">Total Pipeline Value</div>
                <div class="pipeline-value-number" id="pipelineValue">$--</div>
            </div>
            <div style="text-align: right;">
                <div class="pipeline-stat" id="listingsCount">-- properties</div>
                <div class="pipeline-stat" id="avgPrice">Avg: $--</div>
            </div>
        </div>
        
        <!-- Listings Grid -->
        <div class="listings-grid" id="listingsGrid">
            <div class="loading-listings">
                <div class="loading-spinner"></div>
                <p>Loading listings...</p>
            </div>
        </div>
        
    </main>
    
    <script>
        // Load from Google Sheets CSV (auto-updates when sheet changes)
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdI2q5qlHpihVdEm7ev8GHjCqWQQ7NTX0C2MnNRYWkd2eAweBjdPRA2zEG-4xq5dJ4FdvqhgOCkuXU/pub?gid=494197748&single=true&output=csv';
        
        async function loadListings() {
            const grid = document.getElementById('listingsGrid');
            
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csv = await response.text();
                const listings = parseCSV(csv);
                
                // Filter Active listings (Status column = 'A')
                const activeListings = listings.filter(l => l.Status === 'A');
                
                if (activeListings.length === 0) {
                    grid.innerHTML = '<div class="error-message">No active listings found.</div>';
                    return;
                }
                
                // Calculate pipeline value
                const totalValue = activeListings.reduce((sum, l) => {
                    return sum + (parseFloat(l['List Price']) || 0);
                }, 0);
                const avgPrice = totalValue / activeListings.length;
                
                // Update stats
                document.getElementById('pipelineValue').textContent = formatCurrency(totalValue);
                document.getElementById('listingsCount').textContent = activeListings.length + ' properties';
                document.getElementById('avgPrice').textContent = 'Avg: ' + formatCurrency(avgPrice);
                
                // Render listings
                grid.innerHTML = activeListings.map(l => {
                    const price = parseFloat(l['List Price']) || 0;
                    const address = l.Address || 'No address';
                    const city = l.City || '';
                    const state = l.State || 'FL';
                    const county = l.County || '';
                    const beds = l.Bedrooms || '--';
                    const baths = l['Total Baths'] || l['Full Baths'] || '--';
                    const sqft = l['Apx SqFt(Htd/Cooled)'] || '--';
                    const photoUrl = l['Photo URL'] || '';
                    const mlsNumber = l['List Number'] || '';
                    
                    return `
                        <div class="listing-card">
                            <div class="listing-image">
                                ${photoUrl ? `<img src="${photoUrl}" alt="${address}">` : '🏠'}
                            </div>
                            <div class="listing-content">
                                <div class="listing-address">${address}</div>
                                <div class="listing-location">${city}, ${county} County</div>
                                <div class="listing-price">${formatCurrency(price)}</div>
                                <div class="listing-details">
                                    <span>${beds} beds</span>
                                    <span>${baths} baths</span>
                                    <span>${sqft} sqft</span>
                                </div>
                                ${mlsNumber ? `<a href="https://search.my850.com/property/${mlsNumber}" target="_blank" style="color:var(--accent-teal);font-size:0.85rem;">View on my850 →</a>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
                console.log('Loaded', activeListings.length, 'active listings from Google Sheets');
                
            } catch (error) {
                console.error('Error loading listings:', error);
                grid.innerHTML = '<div class="error-message">Failed to load listings. Check console for details.</div>';
            }
        }
        
        // Parse CSV to array of objects
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];
            
            const headers = parseCSVLine(lines[0]);
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] || '';
                });
                data.push(obj);
            }
            
            return data;
        }
        
        // Parse a single CSV line (handles quotes)
        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (const char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }
        
        function formatCurrency(value) {
            if (value >= 1000000) return '$' + (value / 1000000).toFixed(2) + 'M';
            if (value >= 1000) return '$' + (value / 1000).toFixed(0) + 'K';
            return '$' + value.toFixed(0);
        }
        
        document.addEventListener('DOMContentLoaded', loadListings);
    </script>
    
</body>
</html>
