<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Listings | MY850 HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .listings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .listings-stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8f 100%);
            padding: 1.5rem 2rem;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
        }
        .stat-box .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
        }
        .stat-box .label {
            font-size: 0.875rem;
            color: #a0c4e8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-box.volume {
            background: linear-gradient(135deg, #1a5f3c 0%, #2d8f5a 100%);
        }
        .stat-box.volume .label {
            color: #a8e8c4;
        }
        .stat-box.revenue {
            background: linear-gradient(135deg, #5f3a1e 0%, #8f5a2d 100%);
        }
        .stat-box.revenue .label {
            color: #e8d4a8;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #64b5f6;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .back-link:hover {
            color: #90caf9;
        }
        .listings-grid {
            display: grid;
            gap: 1.5rem;
        }
        .listing-card {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #2a3f5f;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .listing-card:hover {
            border-color: #4a90d9;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(74, 144, 217, 0.2);
        }
        .listing-header {
            padding: 1.5rem;
            cursor: pointer;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: center;
        }
        .listing-photo {
            width: 120px;
            height: 90px;
            border-radius: 8px;
            object-fit: cover;
            background: #2a3f5f;
        }
        .listing-main {
            flex: 1;
        }
        .listing-address {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .listing-city {
            font-size: 0.875rem;
            color: #a0b4d0;
        }
        .listing-price {
            text-align: right;
        }
        .price-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4ade80;
        }
        .projected-revenue {
            font-size: 0.875rem;
            color: #fbbf24;
            margin-top: 0.25rem;
        }
        .listing-expand {
            padding: 0.75rem;
            background: none;
            border: none;
            color: #64b5f6;
            cursor: pointer;
            font-size: 1.25rem;
            transition: transform 0.3s;
        }
        .listing-expand.expanded {
            transform: rotate(180deg);
        }
        .listing-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: rgba(0, 0, 0, 0.3);
        }
        .listing-details.expanded {
            max-height: 500px;
        }
        .details-content {
            padding: 1.5rem;
            border-top: 1px solid #2a3f5f;
        }
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 0.75rem;
            color: #6b7a8f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }
        .detail-value {
            font-size: 1rem;
            color: #e0e6f0;
            font-weight: 500;
        }
        .details-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #2a3f5f;
        }
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .listing-badges {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-dom {
            background: #374151;
            color: #9ca3af;
        }
        .badge-type {
            background: #1e40af;
            color: #93c5fd;
        }
        .loading-listings {
            text-align: center;
            padding: 3rem;
            color: #6b7a8f;
        }
    </style>
</head>
<body class="dark-mode">
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🦞</span>
                <div class="logo-text">
                    <h1>MY850 HQ</h1>
                    <span class="logo-tagline">Command Center</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>

    <main class="main-container">

        <div class="listings-header">
            <h2>🏠 Active Listings Dashboard</h2>
            <div class="listings-stats">
                <div class="stat-box">
                    <div class="number" id="activeCount">--</div>
                    <div class="label">Active</div>
                </div>
                <div class="stat-box volume">
                    <div class="number" id="totalVolume">$--</div>
                    <div class="label">Volume</div>
                </div>
                <div class="stat-box revenue">
                    <div class="number" id="projectedRevenue">$--</div>
                    <div class="label">Proj. Revenue</div>
                </div>
            </div>
        </div>

        <section class="section">
            <div class="listings-grid" id="listingsContainer">
                <div class="loading-listings">
                    <div class="loading-spinner"></div>
                    <p>Loading active listings...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Fetch listings data
        async function loadListings() {
            try {
                const response = await fetch('team-listings.json');
                const data = await response.json();
                const listings = data.listings.filter(l => l.status === 'Active');
                
                // Store for seller update generation
                listingsData = listings;
                
                // Calculate stats
                const totalVolume = listings.reduce((sum, l) => sum + (l.listPrice || 0), 0);
                const projectedRevenue = totalVolume * 0.0275;
                
                document.getElementById('activeCount').textContent = listings.length;
                document.getElementById('totalVolume').textContent = '$' + (totalVolume / 1000000).toFixed(2) + 'M';
                document.getElementById('projectedRevenue').textContent = '$' + (projectedRevenue / 1000).toFixed(0) + 'K';
                
                renderListings(listings);
            } catch (error) {
                console.error('Error loading listings:', error);
                document.getElementById('listingsContainer').innerHTML = 
                    '<p style="text-align: center; color: #ef4444;">Error loading listings. Please refresh.</p>';
            }
        }

        function renderListings(listings) {
            const container = document.getElementById('listingsContainer');
            
            if (listings.length === 0) {
                container.innerHTML = '<p style="text-align: center;">No active listings found.</p>';
                return;
            }
            
            container.innerHTML = listings.map(listing => `
                <div class="listing-card" data-mls="${listing.mlsNumber}">
                    <div class="listing-header" onclick="toggleListing('${listing.mlsNumber}')">
                        <img src="${listing.photoUrl || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 90%22><rect fill=%22%232a3f5f%22 width=%22120%22 height=%2290%22/></svg>'}" 
                             alt="${listing.address}" class="listing-photo">
                        <div class="listing-main">
                            <div class="listing-address">${listing.address}</div>
                            <div class="listing-city">${listing.city}, ${listing.state} ${listing.zip}</div>
                            <div class="listing-badges">
                                <span class="badge badge-type">${listing.propertyType || 'Unknown'}</span>
                                <span class="badge badge-dom">${listing.daysOnMarket} DOM</span>
                            </div>
                        </div>
                        <div class="listing-price">
                            <div class="price-value">$${(listing.listPrice || 0).toLocaleString()}</div>
                            <div class="projected-revenue">Proj: $${(listing.listPrice * 0.0275).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div>
                        </div>
                        <button class="listing-expand" id="expand-${listing.mlsNumber}">▼</button>
                    </div>
                    <div class="listing-details" id="details-${listing.mlsNumber}">
                        <div class="details-content">
                            <div class="details-grid">
                                <div class="detail-item">
                                    <span class="detail-label">MLS Number</span>
                                    <span class="detail-value">${listing.mlsNumber}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Seller</span>
                                    <span class="detail-value">${listing.sellerName || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">List Date</span>
                                    <span class="detail-value">${listing.listingDate || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Expires</span>
                                    <span class="detail-value">${listing.expirationDate || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Bed / Bath</span>
                                    <span class="detail-value">${listing.bedrooms || 0} / ${listing.bathrooms || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Square Feet</span>
                                    <span class="detail-value">${(listing.sqft || 0).toLocaleString()}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Year Built</span>
                                    <span class="detail-value">${listing.yearBuilt || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Subdivision</span>
                                    <span class="detail-value">${listing.subdivision || 'N/A'}</span>
                                </div>
                                ${listing.hoa ? `
                                <div class="detail-item">
                                    <span class="detail-label">HOA</span>
                                    <span class="detail-value">${listing.hoa}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">HOA Fee</span>
                                    <span class="detail-value">$${(listing.hoaFee || 0).toLocaleString()}/yr</span>
                                </div>
                                ` : ''}
                                ${listing.taxes ? `
                                <div class="detail-item">
                                    <span class="detail-label">Taxes</span>
                                    <span class="detail-value">$${(listing.taxes || 0).toLocaleString()}/yr</span>
                                </div>
                                ` : ''}
                            </div>
                            ${listing.showingNotes ? `
                            <div style="margin-top: 1rem; padding: 0.75rem; background: rgba(74, 144, 217, 0.1); border-radius: 8px;">
                                <span class="detail-label" style="color: #64b5f6;">Showing Notes</span>
                                <p style="margin: 0.5rem 0 0 0; color: #e0e6f0; font-size: 0.9rem;">${listing.showingNotes}</p>
                            </div>
                            ` : ''}
                            <div class="details-actions">
                                <a href="https://search.my850.com/property/${listing.mlsNumber}" target="_blank" class="btn btn-primary btn-sm">
                                    🔗 View on my850
                                </a>
                                <button class="btn btn-outline btn-sm" onclick="copyListingInfo('${listing.mlsNumber}')">
                                    📋 Copy Info
                                </button>
                                <a href="seller-update.html?mls=${listing.mlsNumber}" class="btn btn-success btn-sm">
                                    ✉️ Seller Update
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleListing(mlsNumber) {
            event.stopPropagation();
            const details = document.getElementById(`details-${mlsNumber}`);
            const expand = document.getElementById(`expand-${mlsNumber}`);
            
            details.classList.toggle('expanded');
            expand.classList.toggle('expanded');
        }

        function copyListingInfo(mlsNumber) {
            event.stopPropagation();
            // Implementation for copying listing info to clipboard
            showToast('Listing info copied to clipboard');
        }

        // Global variable to store listings data for update generation
        let listingsData = [];

        function generateSellerUpdate(mlsNumber) {
            event.stopPropagation();
            const listing = listingsData.find(l => l.mlsNumber === mlsNumber);
            if (!listing) {
                showToast('Error: Listing not found');
                return;
            }

            const sellerFirstName = listing.sellerName ? listing.sellerName.split(' ')[0] : 'there';
            const priceFormatted = (listing.listPrice / 1000).toFixed(0) + 'K';
            
            // Build the seller update with merge fields preserved
            const updateTemplate = `Hi ${sellerFirstName}, Here is a quick update you.
${listing.address}

THE NUMBERS
• Price: $${priceFormatted}
• Days on Market: ${listing.daysOnMarket || 0}

ONLINE ACTIVITY
ZILLOW:
• 316 views, 6 saves, |Zillow Total Saves| total saves, |Save Ratio| save ratio, |Last Save Ratio| last save ratio

HOMES:
• |Homes Views Current| views since last update for a change of |Homes Change| which is |Which Is|

BUYER INTEREST:
• Showings: 3 since last update, |Total Showings| total showings
• Inquiries: 38 Total

FEEDBACK:
|Additional Info|

Neighborhood Summary: 
Listings available: *|Number of Listings in Area|* 
Change from last update:*|Listing Count Change|*
Listings under contract: *|# of Pending Units|* 
Price reductions: *|# of Price Reductions|* 
Property link: [*|Current Listing in Area|*]`;

            // Copy to clipboard
            navigator.clipboard.writeText(updateTemplate).then(() => {
                // Create expandable section to show the update
                const details = document.getElementById(`details-${mlsNumber}`);
                
                // Check if update section already exists
                let updateSection = document.getElementById(`update-${mlsNumber}`);
                if (!updateSection) {
                    updateSection = document.createElement('div');
                    updateSection.id = `update-${mlsNumber}`;
                    updateSection.className = 'seller-update-section';
                    const safeMls = mlsNumber.replace(/"/g, '&quot;');
                updateSection.innerHTML = '<div class="details-content" style="margin-top: 1rem; background: rgba(40, 167, 69, 0.1); border: 1px solid #28a745; border-radius: 8px;">' +
                    '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">' +
                    '<span class="detail-label" style="color: #28a745; font-weight: 600;">📧 Seller Update (copied to clipboard)</span>' +
                    '<button class="btn btn-sm" onclick="document.getElementById(\'update-' + safeMls + '\').remove()" style="background: transparent; border: 1px solid #28a745; color: #28a745;">Close</button>' +
                    '</div>' +
                    '<pre style="white-space: pre-wrap; color: #e0e6f0; font-family: inherit; font-size: 0.9rem; line-height: 1.6; margin: 0;">' + updateTemplate.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>' +
                    '</div>';
                    details.appendChild(updateSection);
                }
                
                // Ensure details section is expanded
                details.classList.add('expanded');
                document.getElementById(`expand-${mlsNumber}`).classList.add('expanded');
                
                showToast('Seller update copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Failed to copy update');
            });
        }

        function showToast(message) {
            // Simple toast implementation
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: #1e3a5f;
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Load on page load
        loadListings();
    </script>
</body>
</html>
