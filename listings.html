<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings | MY850 HQ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Google Sheets Connector -->
    <script src="sheets-connector.js"></script>
    <style>
        .listings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            padding: var(--spacing-lg);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
        
        .listings-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: var(--spacing-xs);
        }
        
        .listings-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .back-link {
            color: var(--accent-teal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 500;
            transition: color var(--transition-fast);
        }
        
        .back-link:hover {
            color: var(--text-primary);
        }
        
        .pipeline-summary {
            background: linear-gradient(135deg, var(--success), #34ce57);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .pipeline-summary.light-mode {
            background: linear-gradient(135deg, #28a745, #34ce57);
        }
        
        .pipeline-value-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }
        
        .pipeline-value-number {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: var(--spacing-xs);
        }
        
        .pipeline-stats {
            text-align: right;
        }
        
        .pipeline-stat {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .listing-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }
        
        .listing-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }
        
        .listing-image {
            height: 200px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        
        .listing-content {
            padding: var(--spacing-lg);
        }
        
        .listing-address {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            line-height: 1.4;
        }
        
        .listing-location {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: var(--spacing-sm);
        }
        
        .listing-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
            margin-bottom: var(--spacing-sm);
        }
        
        .listing-details {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .listing-status {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-active {
            background: rgba(40, 167, 69, 0.2);
            color: var(--success);
        }
        
        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: var(--warning);
        }
        
        .status-sold {
            background: rgba(108, 117, 125, 0.2);
            color: var(--text-muted);
        }
        
        .loading-listings {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: var(--danger);
            padding: var(--spacing-lg);
            border-radius: var(--radius-md);
            text-align: center;
        }
    </style>
</head>
<body class="dark-mode">
    
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <div class="logo-text">
                    <h1>My Listings</h1>
                    <span class="logo-tagline">Property Portfolio</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>
    
    <main class="main-container">
        
        <div class="listings-header">
            <div class="listings-title">
                <h1>Active Listings</h1>
                <p>All properties currently on the market</p>
            </div>
        </div>
        
        <!-- Pipeline Value Summary -->
        <div class="pipeline-summary" id="pipelineSummary">
            <div>
                <div class="pipeline-value-label">Total Pipeline Value</div>
                <div class="pipeline-value-number" id="pipelineValue">$--</div>
            </div>
            <div class="pipeline-stats">
                <div class="pipeline-stat" id="listingsCount">-- properties</div>
                <div class="pipeline-stat" id="avgPrice">Avg: $--</div>
            </div>
        </div>
        
        <!-- Listings Filter -->
        <section class="filters-bar">
            <div class="filter-group">
                <label>Filter by:</label>
                <select id="statusFilter" class="filter-select">
                    <option value="all">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Pending">Pending</option>
                    <option value="Sold">Sold</option>
                </select>
                <select id="countyFilter" class="filter-select">
                    <option value="all">All Counties</option>
                    <option value="Walton">Walton</option>
                    <option value="Broward">Broward</option>
                    <option value="Okaloosa">Okaloosa</option>
                    <option value="Bay">Bay</option>
                </select>
            </div>
        </section>
        
        <!-- Listings Grid -->
        <div class="listings-grid" id="listingsGrid">
            <div class="loading-listings">
                <div class="loading-spinner"></div>
                <p>Loading listings from Google Sheets...</p>
            </div>
        </div>
        
    </main>
    
    <script>
        // Fetch and display listings
        async function loadListings() {
            const grid = document.getElementById('listingsGrid');
            
            try {
                // Fetch from Google Sheets
                const listings = await fetchSheetData('Listings');
                
                if (!listings || listings.length === 0) {
                    grid.innerHTML = '<div class="error-message">No listings found. Check Google Sheet connection.</div>';
                    return;
                }
                
                // Calculate pipeline value
                const totalValue = listings.reduce((sum, listing) => {
                    const price = parseFloat(listing.Price || listing['Asking Price'] || listing.Amount || 0);
                    return sum + (isNaN(price) ? 0 : price);
                }, 0);
                
                const avgPrice = totalValue / listings.length;
                
                // Update pipeline summary
                document.getElementById('pipelineValue').textContent = formatCurrency(totalValue);
                document.getElementById('listingsCount').textContent = `${listings.length} properties`;
                document.getElementById('avgPrice').textContent = `Avg: ${formatCurrency(avgPrice)}`;
                
                // Render listings
                grid.innerHTML = listings.map(listing => {
                    const address = listing.Address || listing['Property Address'] || listing['Full Address'] || 'No address';
                    const price = parseFloat(listing.Price || listing['Asking Price'] || listing.Amount || 0);
                    const status = listing.Status || 'Active';
                    const county = listing.County || 'Unknown';
                    const beds = listing.Beds || listing.Bedrooms || '--';
                    const baths = listing.Baths || listing.Bathrooms || '--';
                    const sqft = listing.SqFt || listing['Square Feet'] || '--';
                    
                    const statusClass = status.toLowerCase() === 'active' ? 'status-active' :
                                       status.toLowerCase() === 'pending' ? 'status-pending' : 'status-sold';
                    
                    return `
                        <div class="listing-card" data-status="${status.toLowerCase()}" data-county="${county.toLowerCase()}">
                            <div class="listing-image">🏠</div>
                            <div class="listing-content">
                                <div class="listing-address">${address}</div>
                                <div class="listing-location">${county} County</div>
                                <div class="listing-price">${formatCurrency(price)}</div>
                                <div class="listing-details">
                                    <span>${beds} beds</span>
                                    <span>${baths} baths</span>
                                    <span>${sqft} sqft</span>
                                </div>
                                <span class="listing-status ${statusClass}">${status}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Setup filters
                setupFilters();
                
            } catch (error) {
                console.error('Error loading listings:', error);
                grid.innerHTML = '<div class="error-message">Failed to load listings. Check console for details.</div>';
            }
        }
        
        // Format currency helper
        function formatCurrency(value) {
            if (value >= 1000000) {
                return '$' + (value / 1000000).toFixed(2) + 'M';
            } else if (value >= 1000) {
                return '$' + (value / 1000).toFixed(0) + 'K';
            }
            return '$' + value.toFixed(0);
        }
        
        // Setup filters
        function setupFilters() {
            const statusFilter = document.getElementById('statusFilter');
            const countyFilter = document.getElementById('countyFilter');
            const cards = document.querySelectorAll('.listing-card');
            
            function applyFilters() {
                const status = statusFilter.value;
                const county = countyFilter.value;
                
                cards.forEach(card => {
                    const cardStatus = card.getAttribute('data-status');
                    const cardCounty = card.getAttribute('data-county');
                    
                    const statusMatch = status === 'all' || cardStatus === status.toLowerCase();
                    const countyMatch = county === 'all' || cardCounty === county.toLowerCase();
                    
                    card.style.display = (statusMatch && countyMatch) ? 'block' : 'none';
                });
            }
            
            statusFilter.addEventListener('change', applyFilters);
            countyFilter.addEventListener('change', applyFilters);
        }
        
        // Load on page load
        document.addEventListener('DOMContentLoaded', loadListings);
    </script>
    
</body>
</html>
