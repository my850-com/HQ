<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Leads | MY850 HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .buyer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
        .buyer-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: var(--spacing-xs);
        }
        .buyer-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .back-link {
            color: var(--accent-teal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 500;
        }
        .back-link:hover {
            color: var(--text-primary);
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            min-width: 150px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .data-table th {
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            user-select: none;
        }
        .data-table th:hover {
            color: var(--text-primary);
        }
        .data-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        .priority-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .priority-hot {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
        }
        .priority-warm {
            background: rgba(253, 126, 20, 0.2);
            color: #fd7e14;
        }
        .priority-cold {
            background: rgba(108, 117, 125, 0.2);
            color: #adb5bd;
        }
        .follow-up-warning {
            color: #fd7e14;
            font-size: 0.8rem;
        }
        .contact-actions {
            display: flex;
            gap: 0.5rem;
        }
        .contact-btn {
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-email {
            background: linear-gradient(135deg, #2E5090, #20C997);
            color: white;
        }
        .btn-phone {
            background: linear-gradient(135deg, #28a745, #20C997);
            color: white;
        }
        .loading-cell {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: var(--danger);
            padding: var(--spacing-lg);
            border-radius: var(--radius-md);
            text-align: center;
        }
        .table-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1rem;
        }
        .sort-icon {
            margin-left: 0.25rem;
            opacity: 0.5;
        }
        .sort-active .sort-icon {
            opacity: 1;
        }
    </style>
</head>
<body class="dark-mode">
    
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <img src="sherlock-avatar.png" alt="MY850 HQ" class="logo-img" style="width: 40px; height: 40px; border-radius: 8px;">
                <div class="logo-text">
                    <h1>MY850 HQ</h1>
                    <span class="logo-tagline">Buyer Leads</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>

    <main class="main-container">
        
        <div class="buyer-header">
            <div class="buyer-title">
                <h1>Buyer Leads</h1>
                <p id="leadCount">Loading...</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <select class="filter-select" id="priorityFilter" onchange="applyFilters()">
                <option value="all">All Priorities</option>
                <option value="Hot">🔥 Hot</option>
                <option value="Warm">🟡 Warm</option>
                <option value="Cold">🔵 Cold</option>
            </select>
            <select class="filter-select" id="propertyTypeFilter" onchange="applyFilters()">
                <option value="all">All Property Types</option>
                <option value="Single Family">Single Family</option>
                <option value="Condo">Condo</option>
                <option value="Townhome">Townhome</option>
                <option value="Mobile Home">Mobile Home</option>
            </select>
            <select class="filter-select" id="sourceFilter" onchange="applyFilters()">
                <option value="all">All Sources</option>
                <option value="Homebot">Homebot</option>
                <option value="Sign Call">Sign Call</option>
                <option value="Referral">Referral</option>
                <option value="Zillow">Zillow</option>
                <option value="Website">Website</option>
            </select>
            <input type="text" class="filter-select" id="searchFilter" placeholder="Search buyers..." onkeyup="applyFilters()">
        </div>
        
        <!-- Leads Table -->
        <section class="section">
            <div class="table-wrapper">
                <table class="data-table" id="buyerTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable('priority')">Priority <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('name')">Name <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('location')">Location <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('budget')">Budget <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('type')">Type <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('timeframe')">Timeframe <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('source')">Source <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('lastContact')">Last Contact <span class="sort-icon">↕</span></th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="buyerTableBody">
                        <tr>
                            <td colspan="9" class="loading-cell">
                                <div class="loading-spinner"></div>
                                <p>Loading buyer leads...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="table-pagination">
                <button class="btn btn-sm" id="prevPage" onclick="changePage(-1)">← Previous</button>
                <span id="pageInfo">Page 1 of 1</span>
                <button class="btn btn-sm" id="nextPage" onclick="changePage(1)">Next →</button>
            </div>
        </section>
    </main>

    <script>
        // Google Sheet CSV URL for Buyer Leads tab
        // Google Sheet CSV URL for Buyer Leads tab (published)
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdI2q5qlHpihVdEm7ev8GHjCqWQQ7NTX0C2MnNRYWkd2eAweBjdPRA2zEG-4xq5dJ4FdvqhgOCkuXU/pub?gid=97439156&single=true&output=csv';
        
        let allLeads = [];
        let currentLeads = [];
        let currentPage = 1;
        const rowsPerPage = 20;
        let currentSort = { field: null, direction: 'asc' };
        
        async function loadBuyerLeads() {
            const tbody = document.getElementById('buyerTableBody');
            
            try {
                // Fetch with explicit headers (same as listings.html)
                const response = await fetch(SHEET_CSV_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'text/csv,text/plain,*/*'
                    }
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const csv = await response.text();
                if (!csv || csv.trim().length === 0) throw new Error('Empty CSV');
                
                allLeads = parseCSV(csv);
                currentLeads = [...allLeads];
                
                // Update count
                updateLeadCount();
                
                // Apply any active filters and render
                applyFilters();
                
                // Save count for dashboard
                try {
                    localStorage.setItem('buyerLeadsCount', allLeads.length);
                    localStorage.setItem('buyerLeadsLastUpdated', new Date().toISOString());
                } catch(e) {}
                
                console.log('Loaded', allLeads.length, 'buyer leads');
                
            } catch (error) {
                console.error('Error loading leads:', error);
                tbody.innerHTML = '<tr><td colspan="9" class="error-message"><p>❌ Failed to load buyer leads</p><p style="font-size:0.8rem;margin-top:10px;">' + error.message + '</p><button onclick="loadBuyerLeads()">Retry</button></td></tr>';
            }
        }
        
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];
            
            const headers = parseCSVLine(lines[0]);
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] || '';
                });
                if (row.Name || row.name) data.push(row);
            }
            
            return data;
        }
        
        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (const char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }
        
        function updateLeadCount() {
            const filteredCount = currentLeads.length;
            const totalCount = allLeads.length;
            document.getElementById('leadCount').textContent = 
                filteredCount === totalCount 
                    ? totalCount + ' active buyer lead' + (totalCount !== 1 ? 's' : '')
                    : filteredCount + ' of ' + totalCount + ' leads';
        }
        
        function applyFilters() {
            const priority = document.getElementById('priorityFilter').value;
            const propertyType = document.getElementById('propertyTypeFilter').value;
            const source = document.getElementById('sourceFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            currentLeads = allLeads.filter(l => {
                const lPriority = (l.Priority || l.priority || '').toLowerCase();
                const lType = (l['Property Type'] || l.propertyType || '').toLowerCase();
                const lSource = (l.Source || l.source || '').toLowerCase();
                const lName = (l.Name || l.name || '').toLowerCase();
                const lLocation = (l.Location || l.location || '').toLowerCase();
                
                if (priority !== 'all' && !lPriority.includes(priority.toLowerCase())) return false;
                if (propertyType !== 'all' && !lType.includes(propertyType.toLowerCase())) return false;
                if (source !== 'all' && !lSource.includes(source.toLowerCase())) return false;
                if (search && !lName.includes(search) && !lLocation.includes(search)) return false;
                
                return true;
            });
            
            // Apply current sort if any
            if (currentSort.field) {
                sortLeads(currentSort.field, currentSort.direction);
            }
            
            currentPage = 1;
            updateLeadCount();
            renderTable();
        }
        
        function sortTable(field) {
            // Toggle direction
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'desc';
            }
            
            sortLeads(field, currentSort.direction);
            renderTable();
            
            // Update header visual
            document.querySelectorAll('.data-table th').forEach(th => {
                th.classList.remove('sort-active');
            });
        }
        
        function sortLeads(field, direction) {
            currentLeads.sort((a, b) => {
                let valA, valB;
                
                switch(field) {
                    case 'name':
                        valA = (a.Name || a.name || '').toLowerCase();
                        valB = (b.Name || b.name || '').toLowerCase();
                        break;
                    case 'location':
                        valA = (a.Location || a.location || '').toLowerCase();
                        valB = (b.Location || b.location || '').toLowerCase();
                        break;
                    case 'budget':
                        valA = parseFloat(a['Budget/Price'] || a.budget || a['Asking Price'] || 0);
                        valB = parseFloat(b['Budget/Price'] || b.budget || b['Asking Price'] || 0);
                        break;
                    case 'type':
                        valA = (a['Property Type'] || a.propertyType || '').toLowerCase();
                        valB = (b['Property Type'] || b.propertyType || '').toLowerCase();
                        break;
                    case 'timeframe':
                        valA = (a['Time Frame'] || a.timeFrame || '').toLowerCase();
                        valB = (b['Time Frame'] || b.timeFrame || '').toLowerCase();
                        break;
                    case 'source':
                        valA = (a.Source || a.source || '').toLowerCase();
                        valB = (b.Source || b.source || '').toLowerCase();
                        break;
                    case 'lastContact':
                        valA = new Date(a['Last Contact'] || a.lastContact || '1900-01-01').getTime();
                        valB = new Date(b['Last Contact'] || b.lastContact || '1900-01-01').getTime();
                        break;
                    case 'priority':
                        const priorityOrder = { 'hot': 3, 'warm': 2, 'cold': 1 };
                        valA = priorityOrder[(a.Priority || a.priority || 'cold').toLowerCase()] || 0;
                        valB = priorityOrder[(b.Priority || b.priority || 'cold').toLowerCase()] || 0;
                        break;
                    default:
                        valA = ''; valB = '';
                }
                
                if (direction === 'asc') {
                    return valA > valB ? 1 : valA < valB ? -1 : 0;
                } else {
                    return valA < valB ? 1 : valA > valB ? -1 : 0;
                }
            });
        }
        
        function renderTable() {
            const tbody = document.getElementById('buyerTableBody');
            const totalPages = Math.ceil(currentLeads.length / rowsPerPage);
            
            // Ensure valid page
            if (currentPage > totalPages) currentPage = totalPages || 1;
            
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageLeads = currentLeads.slice(start, end);
            
            if (pageLeads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="loading-cell">No buyer leads match your filters.</td></tr>';
                document.getElementById('pageInfo').textContent = 'Page 0 of 0';
                return;
            }
            
            tbody.innerHTML = pageLeads.map(l => {
                const name = l.Name || l.name || 'Unknown';
                const email = l.Email || l.email || '';
                const phone = l.Phone || l.phone || '';
                const priority = (l.Priority || l.priority || 'Cold').toLowerCase();
                const location = l.Location || l.location || 'Location TBD';
                const propertyType = l['Property Type'] || l.propertyType || 'Not specified';
                const budgetRaw = l['Budget/Price'] || l.budget || l['Asking Price'] || '0';
                const budget = parseFloat(budgetRaw) || 0;
                const timeFrame = l['Time Frame'] || l.timeFrame || 'Not specified';
                const source = l.Source || l.source || 'Unknown';
                const lastContact = l['Last Contact'] || l.lastContact || '';
                
                // Determine priority class
                let priorityClass = 'priority-cold';
                let priorityLabel = 'COLD';
                if (priority.includes('hot')) {
                    priorityClass = 'priority-hot';
                    priorityLabel = 'HOT';
                } else if (priority.includes('warm')) {
                    priorityClass = 'priority-warm';
                    priorityLabel = 'WARM';
                }
                
                // Check if follow-up needed
                let followUpHtml = '';
                if (lastContact) {
                    const daysSince = daysSinceContact(lastContact);
                    if (daysSince > 7) {
                        followUpHtml = `<br><span class="follow-up-warning">⚠️ ${daysSince} days</span>`;
                    }
                }
                
                return `
                    <tr>
                        <td><span class="priority-badge ${priorityClass}">${priorityLabel}</span></td>
                        <td><strong>${name}</strong></td>
                        <td>${location}</td>
                        <td>${budget ? '$' + budget.toLocaleString() : '-'}</td>
                        <td>${propertyType}</td>
                        <td>${timeFrame}</td>
                        <td>${source}</td>
                        <td>${formatDate(lastContact) || 'Never'}${followUpHtml}</td>
                        <td>
                            <div class="contact-actions">
                                ${email ? `<button class="contact-btn btn-email" onclick="openEmail('${escapeJs(email)}', '${escapeJs(name)}')">✉️ Email</button>` : ''}
                                ${phone ? `<button class="contact-btn btn-phone" onclick="openPhone('${escapeJs(phone)}')">📞 Call</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }
        
        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }
        
        function daysSinceContact(dateStr) {
            if (!dateStr) return 0;
            const contact = new Date(dateStr);
            const now = new Date();
            return Math.floor((now - contact) / (1000 * 60 * 60 * 24));
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        
        function openEmail(email, name) {
            const subject = encodeURIComponent('Following up on your home search');
            const body = encodeURIComponent(`Hi ${name.split(' ')[0]},\n\n`);
            window.open(`mailto:${email}?subject=${subject}&body=${body}`, '_blank');
        }
        
        function openPhone(phone) {
            window.open(`tel:${phone.replace(/\D/g,'')}`, '_self');
        }
        
        function escapeJs(str) {
            return str.replace(/[\\']/g, '\\$&').replace(/\n/g, '\\n');
        }
        
        // Load on page load
        loadBuyerLeads();
        // Refresh every 5 minutes
        setInterval(loadBuyerLeads, 5 * 60 * 1000);
    </script>
</body>
</html>
