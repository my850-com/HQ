<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | Office Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .back-link {
            color: #4a9eff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link:hover { color: #6fb3ff; }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            background: #00d26a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .last-sync {
            font-size: 12px;
            color: #888;
        }
        
        .office-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .office-floor {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            min-height: 600px;
            position: relative;
        }
        
        .floor-label {
            position: absolute;
            top: -12px;
            left: 40px;
            background: #1a3a5c;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #c9a227;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .agent-station {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .agent-station:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .agent-station.active {
            border-color: rgba(74, 158, 255, 0.5);
            background: rgba(74, 158, 255, 0.05);
        }
        
        .agent-station.idle {
            border-color: rgba(0, 210, 106, 0.3);
        }
        
        .agent-station.busy {
            border-color: rgba(255, 193, 7, 0.5);
            background: rgba(255, 193, 7, 0.05);
        }
        
        .agent-station.error {
            border-color: rgba(255, 71, 87, 0.5);
            background: rgba(255, 71, 87, 0.05);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            position: relative;
        }
        
        .agent-avatar.sherlock {
            background: linear-gradient(135deg, #1a3a5c, #2d5a87);
            border: 3px solid #4a9eff;
        }
        
        .agent-avatar.lars {
            background: linear-gradient(135deg, #2d3436, #636e72);
            border: 3px solid #00d26a;
        }
        
        .agent-avatar.subagent {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: 3px solid #a29bfe;
        }
        
        .activity-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }
        
        .activity-dot.online { background: #00d26a; }
        .activity-dot.busy { background: #ffc107; }
        .activity-dot.offline { background: #636e72; }
        .activity-dot.error { background: #ff4757; }
        
        .agent-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .agent-info .role {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge.active {
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
        }
        
        .status-badge.idle {
            background: rgba(0, 210, 106, 0.2);
            color: #00d26a;
        }
        
        .status-badge.busy {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-badge.error {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
        
        .current-task {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 15px;
        }
        
        .task-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .task-description {
            font-size: 14px;
            line-height: 1.5;
            color: #e0e0e0;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #6fb3ff);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        .progress-fill.complete {
            background: linear-gradient(90deg, #00d26a, #00ff88);
        }
        
        .agent-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .meta-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }
        
        .meta-value {
            font-size: 13px;
            color: #fff;
            font-weight: 500;
        }
        
        .workflows-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        
        .workflows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .workflow-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        
        .workflow-card.running {
            border-left: 3px solid #ffc107;
        }
        
        .workflow-card.complete {
            border-left: 3px solid #00d26a;
        }
        
        .workflow-card.queued {
            border-left: 3px solid #888;
        }
        
        .workflow-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .workflow-stage {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .workflow-eta {
            font-size: 12px;
            color: #4a9eff;
        }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }
        
        .refresh-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="index.html" class="back-link">← Back to Mission Control</a>
            <h1>
                <span class="status-indicator"></span>
                Office Dashboard
            </h1>
            <div class="auto-refresh">
                <div class="refresh-spinner"></div>
                <span id="last-sync">Syncing...</span>
            </div>
        </div>
    </header>
    
    <main class="office-container">
        <div class="office-floor">
            <span class="floor-label">Operations Center</span>
            
            <div class="agents-grid" id="agents-container">
                <!-- Agents populated by JavaScript -->
            </div>
            
            <div class="workflows-section">
                <h2 class="section-title">Active Workflows</h2>
                <div class="workflows-grid" id="workflows-container">
                    <!-- Workflows populated by JavaScript -->
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // Mock data structure - in production, this fetches from status.json
        let officeData = {
            agents: [
                {
                    id: 'sherlock',
                    name: 'Sherlock',
                    role: 'Lead AI Agent',
                    avatar: '🦞',
                    status: 'active',
                    activity: 'online',
                    currentTask: 'Processing Lis Pendens data from Broward County',
                    taskProgress: 65,
                    lastActive: 'Now',
                    tasksCompleted: 127
                },
                {
                    id: 'lars',
                    name: 'Lars',
                    role: 'Human Operator',
                    avatar: '👤',
                    status: 'idle',
                    activity: 'online',
                    currentTask: 'Reviewing hot sheet data',
                    taskProgress: 0,
                    lastActive: '2 min ago',
                    tasksCompleted: 89
                }
            ],
            workflows: [
                {
                    name: 'MVP Pipeline',
                    stage: 'Letter generation',
                    eta: '2 min',
                    status: 'running'
                },
                {
                    name: 'Hot Sheet Processing',
                    stage: 'Data validation',
                    eta: 'Completed',
                    status: 'complete'
                },
                {
                    name: 'Lis Pendens Scoring',
                    stage: 'Queued',
                    eta: 'Awaiting CSV upload',
                    status: 'queued'
                }
            ]
        };
        
        function renderAgents() {
            const container = document.getElementById('agents-container');
            
            if (officeData.agents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🤖</div>
                        <p>No agents currently active</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = officeData.agents.map(agent => `
                <div class="agent-station ${agent.status}">
                    <div class="agent-header">
                        <div class="agent-avatar ${agent.id === 'sherlock' ? 'sherlock' : agent.id === 'lars' ? 'lars' : 'subagent'}">
                            ${agent.avatar}
                            <div class="activity-dot ${agent.activity}"></div>
                        </div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <div class="role">${agent.role}</div>
                        </div>
                    </div>
                    
                    <span class="status-badge ${agent.status}">${agent.status}</span>
                    
                    <div class="current-task">
                        <div class="task-label">Current Assignment</div>
                        <div class="task-description">${agent.currentTask}</div>
                        ${agent.taskProgress > 0 ? `
                            <div class="progress-bar">
                                <div class="progress-fill ${agent.taskProgress === 100 ? 'complete' : ''}" style="width: ${agent.taskProgress}%"></div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="agent-meta">
                        <div class="meta-item">
                            <span class="meta-label">Last Active</span>
                            <span class="meta-value">${agent.lastActive}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Tasks Done</span>
                            <span class="meta-value">${agent.tasksCompleted}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderWorkflows() {
            const container = document.getElementById('workflows-container');
            
            if (officeData.workflows.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No active workflows</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = officeData.workflows.map(workflow => `
                <div class="workflow-card ${workflow.status}">
                    <div class="workflow-name">${workflow.name}</div>
                    <div class="workflow-stage">${workflow.stage}</div>
                    <div class="workflow-eta">${workflow.eta}</div>
                </div>
            `).join('');
        }
        
        function updateLastSync() {
            const now = new Date();
            document.getElementById('last-sync').textContent = 
                `Updated ${now.toLocaleTimeString()}`;
        }
        
        async function fetchStatus() {
            try {
                // In production, fetch from actual status.json endpoint
                // const response = await fetch('data/office-status.json');
                // officeData = await response.json();
                
                // For now, simulate updates
                renderAgents();
                renderWorkflows();
                updateLastSync();
            } catch (error) {
                console.error('Failed to fetch status:', error);
            }
        }
        
        // Initial render
        renderAgents();
        renderWorkflows();
        updateLastSync();
        
        // Auto-refresh every 10 seconds
        setInterval(fetchStatus, 10000);
    </script>
</body>
</html>
