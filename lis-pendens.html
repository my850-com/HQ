<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lis Pendens Leads | MY850 HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .lis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
        .lis-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: var(--spacing-xs);
        }
        .lis-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .back-link {
            color: var(--accent-teal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 500;
        }
        .back-link:hover {
            color: var(--text-primary);
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            min-width: 150px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .data-table th {
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            user-select: none;
        }
        .data-table th:hover {
            color: var(--text-primary);
        }
        .data-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        .grade-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .grade-a {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
        }
        .grade-b {
            background: rgba(253, 126, 20, 0.2);
            color: #fd7e14;
        }
        .grade-c, .grade-d {
            background: rgba(108, 117, 125, 0.2);
            color: #adb5bd;
        }
        .score-value {
            font-weight: 700;
            color: #4ade80;
        }
        .hot-indicator {
            color: #ff6b6b;
            font-size: 1.2rem;
        }
        .tags-cell {
            font-size: 0.8rem;
            color: var(--text-muted);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading-cell {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: var(--danger);
            padding: var(--spacing-lg);
            border-radius: var(--radius-md);
            text-align: center;
        }
        .table-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1rem;
        }
        .sort-icon {
            margin-left: 0.25rem;
            opacity: 0.5;
        }
        .sort-active .sort-icon {
            opacity: 1;
        }
        .action-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: var(--accent-teal);
            color: white;
        }
    </style>
</head>
<body class="dark-mode">
    
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <img src="sherlock-avatar.png" alt="MY850 HQ" class="logo-img" style="width: 40px; height: 40px; border-radius: 8px;">
                <div class="logo-text">
                    <h1>MY850 HQ</h1>
                    <span class="logo-tagline">Lis Pendens Leads</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
    </header>

    <main class="main-container">
        
        <div class="lis-header">
            <div class="lis-title">
                <h1>Lis Pendens Leads</h1>
                <p id="leadCount">Loading...</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <select class="filter-select" id="gradeFilter" onchange="applyFilters()">
                <option value="all">All Grades</option>
                <option value="A">🔥 Grade A (Hot)</option>
                <option value="B">🟡 Grade B (Warm)</option>
                <option value="C">🔵 Grade C (Cool)</option>
                <option value="D">⚪ Grade D (Cold)</option>
            </select>
            <select class="filter-select" id="hotFilter" onchange="applyFilters()">
                <option value="all">All Leads</option>
                <option value="true">🔥 Hot Only</option>
                <option value="false">📋 Regular</option>
            </select>
            <input type="text" class="filter-select" id="searchFilter" placeholder="Search name or property..." onkeyup="applyFilters()">
        </div>
        
        <!-- Leads Table -->
        <section class="section">
            <div class="table-wrapper">
                <table class="data-table" id="lisTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable('grade')">Grade <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('name')">Name <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('property')">Property <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('score')">Score <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('tags')">Tags <span class="sort-icon">↕</span></th>
                            <th onclick="sortTable('hot')">Status <span class="sort-icon">↕</span></th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="lisTableBody">
                        <tr>
                            <td colspan="7" class="loading-cell">
                                <div class="loading-spinner"></div>
                                <p>Loading Lis Pendens leads...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="table-pagination">
                <button class="btn btn-sm" id="prevPage" onclick="changePage(-1)">← Previous</button>
                <span id="pageInfo">Page 1 of 1</span>
                <button class="btn btn-sm" id="nextPage" onclick="changePage(1)">Next →</button>
            </div>
        </section>
    </main>

    <!-- Data Connector -->
    <script src="data-connector.js"></script>
    
    <script>
        // MVP Scored CSV Format: id, name, property, score, grade, tags, is_hot, phone, email
        const LIS_PENDENS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1d_UzZrIs4oO5Z3Nshc_UO4Fcorbimmm6rKovIyybdcg/gviz/tq?tqx=out:csv&sheet=Lis%20Pendens%20Data';
        
        let allLeads = [];
        let currentLeads = [];
        let currentPage = 1;
        const rowsPerPage = 20;
        let currentSort = { field: null, direction: 'desc' };
        
        // Parse CSV line (handles quoted values)
        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (const char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }
        
        // Parse CSV text into objects
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];
            
            const headers = parseCSVLine(lines[0]);
            const rows = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const row = {};
                headers.forEach((header, index) => {
                    const key = header.toLowerCase().replace(/\s+/g, '_');
                    row[key] = values[index] || '';
                });
                if (row.name || row.id) rows.push(row);
            }
            
            return rows;
        }
        
        async function loadLisPendensLeads() {
            const tbody = document.getElementById('lisTableBody');
            
            try {
                let rows;
                
                // Try DataConnector first, fallback to direct fetch
                if (typeof DataConnector !== 'undefined') {
                    rows = await DataConnector.getData('lisPendens');
                } else {
                    const response = await fetch(LIS_PENDENS_SHEET_URL, { headers: { 'Accept': 'text/csv' } });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const csv = await response.text();
                    rows = parseCSV(csv);
                }
                
                // Normalize to MVP format
                allLeads = rows.map(row => ({
                    id: row.id || row.ID || '',
                    name: row.name || row.Name || row['Owner Name'] || 'Unknown',
                    property: row.property || row.Property || row['Property Address'] || '',
                    score: parseInt(row.score || row.Score || 0),
                    grade: (row.grade || row.Grade || 'C').toUpperCase(),
                    tags: row.tags || row.Tags || '',
                    is_hot: row.is_hot === 'TRUE' || row.is_hot === 'true' || row.is_hot === true || (row.grade || '').toUpperCase() === 'A',
                    phone: row.phone || row.Phone || '',
                    email: row.email || row.Email || ''
                }));
                
                currentLeads = [...allLeads];
                
                // Update count
                updateLeadCount();
                
                // Apply filters and render
                applyFilters();
                
                console.log('Loaded', allLeads.length, 'Lis Pendens leads');
                
            } catch (error) {
                console.error('Error loading leads:', error);
                tbody.innerHTML = '<tr><td colspan="7" class="error-message"><p>❌ Failed to load Lis Pendens leads</p><p style="font-size:0.8rem;margin-top:10px;">' + error.message + '</p><button onclick="loadLisPendensLeads()" class="btn btn-sm">Retry</button></td></tr>';
            }
        }
        
        function updateLeadCount() {
            const totalCount = allLeads.length;
            const filteredCount = currentLeads.length;
            document.getElementById('leadCount').textContent = 
                filteredCount === totalCount 
                    ? totalCount + ' scored lead' + (totalCount !== 1 ? 's' : '')
                    : filteredCount + ' of ' + totalCount + ' leads';
        }
        
        function applyFilters() {
            const grade = document.getElementById('gradeFilter').value;
            const hot = document.getElementById('hotFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            currentLeads = allLeads.filter(l => {
                if (grade !== 'all' && l.grade !== grade) return false;
                if (hot !== 'all') {
                    const isHot = hot === 'true';
                    if (l.is_hot !== isHot) return false;
                }
                if (search) {
                    const nameMatch = l.name.toLowerCase().includes(search);
                    const propMatch = l.property.toLowerCase().includes(search);
                    if (!nameMatch && !propMatch) return false;
                }
                return true;
            });
            
            if (currentSort.field) {
                sortLeads(currentSort.field, currentSort.direction);
            }
            
            currentPage = 1;
            updateLeadCount();
            renderTable();
        }
        
        function sortTable(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = field === 'score' ? 'desc' : 'asc';
            }
            
            sortLeads(field, currentSort.direction);
            renderTable();
        }
        
        function sortLeads(field, direction) {
            currentLeads.sort((a, b) => {
                let valA, valB;
                
                switch(field) {
                    case 'name':
                        valA = a.name.toLowerCase();
                        valB = b.name.toLowerCase();
                        break;
                    case 'property':
                        valA = a.property.toLowerCase();
                        valB = b.property.toLowerCase();
                        break;
                    case 'score':
                        valA = a.score;
                        valB = b.score;
                        break;
                    case 'grade':
                        const gradeOrder = { 'A': 4, 'B': 3, 'C': 2, 'D': 1 };
                        valA = gradeOrder[a.grade] || 0;
                        valB = gradeOrder[b.grade] || 0;
                        break;
                    case 'tags':
                        valA = a.tags.toLowerCase();
                        valB = b.tags.toLowerCase();
                        break;
                    case 'hot':
                        valA = a.is_hot ? 1 : 0;
                        valB = b.is_hot ? 1 : 0;
                        break;
                    default:
                        valA = ''; valB = '';
                }
                
                if (direction === 'asc') {
                    return valA > valB ? 1 : valA < valB ? -1 : 0;
                } else {
                    return valA < valB ? 1 : valA > valB ? -1 : 0;
                }
            });
        }
        
        function renderTable() {
            const tbody = document.getElementById('lisTableBody');
            const totalPages = Math.ceil(currentLeads.length / rowsPerPage);
            
            if (currentPage > totalPages) currentPage = totalPages || 1;
            
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageLeads = currentLeads.slice(start, end);
            
            if (pageLeads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading-cell">No Lis Pendens leads match your filters.</td></tr>';
                document.getElementById('pageInfo').textContent = 'Page 0 of 0';
                return;
            }
            
            tbody.innerHTML = pageLeads.map(l => {
                // Grade badge styling
                const gradeClass = 'grade-' + l.grade.toLowerCase();
                const gradeLabels = { 'A': 'A', 'B': 'B', 'C': 'C', 'D': 'D' };
                
                // Hot indicator
                const hotHtml = l.is_hot ? '<span class="hot-indicator">🔥</span>' : '';
                
                return `
                    <tr>
                        <td><span class="grade-badge ${gradeClass}">${gradeLabels[l.grade] || l.grade}</span></td>
                        <td><strong>${l.name}</strong></td>
                        <td>${l.property}</td>
                        <td class="score-value">${l.score}</td>
                        <td class="tags-cell" title="${l.tags}">${l.tags}</td>
                        <td>${hotHtml}</td>
                        <td>
                            <button class="action-btn" onclick="copyLeadInfo('${escapeJs(l.name)}', '${escapeJs(l.property)}', '${escapeJs(l.phone)}')">📋</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }
        
        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }
        
        function copyLeadInfo(name, property, phone) {
            const text = `${name}\n${property}${phone ? '\n' + phone : ''}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Lead info copied');
            });
        }
        
        function escapeJs(str) {
            return str.replace(/[\\']/g, '\\$&').replace(/\n/g, '\\n').replace(/"/g, '&quot;');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: var(--bg-tertiary);
                color: var(--text-primary);
                padding: 1rem 1.5rem;
                border-radius: 8px;
                border: 1px solid var(--border-color);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Load on page load
        loadLisPendensLeads();
        // Refresh every 5 minutes
        setInterval(loadLisPendensLeads, 5 * 60 * 1000);
    </script>
</body>
</html>
