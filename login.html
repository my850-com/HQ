<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MY850 HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #252542;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --text-muted: #6c6c8a;
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #2E5090;
            --accent-teal: #20C997;
            --danger: #DC3545;
            --success: #28A745;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* No JavaScript Warning */
        .noscript-warning {
            background: rgba(220, 53, 69, 0.1);
            border: 2px solid var(--danger);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            margin-bottom: 2rem;
        }
        .noscript-warning h2 {
            color: var(--danger);
            margin-bottom: 1rem;
        }
        .noscript-warning p {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* Login Container */
        .login-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            margin-bottom: 2rem;
        }
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 1rem;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.visible {
            display: block;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-teal) 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(32, 201, 151, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .secure-note {
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-login.loading .loading-spinner {
            display: inline-block;
            margin-right: 0.5rem;
        }
        .btn-login.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- No JavaScript Warning - Shows when JS disabled -->
    <noscript>
        <div class="noscript-warning">
            <h2>🔒 JavaScript Required</h2>
            <p>This dashboard requires JavaScript to verify your credentials securely.</p>
            <p style="margin-top: 1rem;">Please enable JavaScript in your browser settings to access the MY850 HQ Dashboard.</p>
        </div>
    </noscript>
    
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="logo">
            <img src="sherlock-avatar.png" alt="MY850 HQ">
            <h1>MY850 HQ</h1>
            <p>Team Dashboard</p>
        </div>
        
        <form class="login-form" id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="Enter password" 
                    autocomplete="current-password"
                    required
                >
            </div>
            
            <div class="error-message" id="errorMessage">
                Incorrect password. Please try again.
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="loading-spinner"></span>
                <span class="btn-text">Access Dashboard</span>
            </button>
        </form>
        
        <div class="secure-note">
            <span>🔒</span>
            <span>Secure session expires in 4 hours</span>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script>
        (function() {
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const loginForm = document.getElementById('loginForm');
            
            // Focus password field on load
            passwordInput.focus();
            
            // Handle Enter key
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
            
            // Handle button click
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                handleLogin();
            });
            
            async function handleLogin() {
                const password = passwordInput.value.trim();
                
                if (!password) {
                    showError('Please enter a password');
                    passwordInput.focus();
                    return;
                }
                
                // Show loading state
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
                hideError();
                
                try {
                    const isValid = await HQAuth.handleLogin(password);
                    
                    if (isValid) {
                        // Success - redirect to requested page or index
                        const returnTo = HQAuth.getReturnUrl();
                        window.location.href = returnTo;
                    } else {
                        showError('Incorrect password. Please try again.');
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showError('An error occurred. Please try again.');
                } finally {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            }
            
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.classList.add('visible');
            }
            
            function hideError() {
                errorMessage.classList.remove('visible');
            }
            
            // Clear any existing session on login page
            if (window.HQAuth) {
                HQAuth.clearSession();
            }
        })();
    </script>
</body>
</html>
